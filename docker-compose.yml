services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: highload_testing_db
      POSTGRES_USER: highload_testing_user
      POSTGRES_PASSWORD: highload_testing_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data


volumes:
  postgres_data:
