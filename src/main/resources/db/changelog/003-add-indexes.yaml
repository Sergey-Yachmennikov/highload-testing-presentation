databaseChangeLog:
  - changeSet:
      id: 3
      author: highload-demo
      comment: "Indexes for search performance demo. Compare query speed before and after."
      changes:
        - createIndex:
            tableName: products
            indexName: idx_products_name
            columns:
              - column:
                  name: name

        - createIndex:
            tableName: products
            indexName: idx_products_category
            columns:
              - column:
                  name: category
